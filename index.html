<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>dashboard grid media</title>
    <link rel="stylesheet" href="style.css" />
    <link
        href="https://fonts.googleapis.com/icon?family=Material+Icons"
        rel="stylesheet"
    />
</head>
<body>
    <div class="container">
    <div class="header">
        MENU
    </div>
        <div class="menu">
            <div class="menu-item">
                <span class="material-icons">person</span>
                <span class="text">Profile</span>
            </div>
            <div class="menu-item">
                <span class="material-icons">home</span>
                <span class="text">Dashboard</span>
            </div>
            <div class="menu-item">
                <span class="material-icons" class="icon-color">star</span>
                <span class="text">Apps</span>
            </div>
            <div class="menu-item">
                <span class="material-icons" class="icon-color">bar_chart</span>
                <span class="text">Chart</span>
            </div>
            <div class="menu-item">
                <span class="material-icons" class="icon-color">chat_bubble</span>
                <span class="text">Chat</span>
            </div>
            <div class="menu-item">
                <span class="material-icons" class="icon-color">settings</span>
                <span class="text">Setting</span>
            </div>
            <div class="menu-item">
                <span class="material-icons" class="icon-color">error</span>
                <span class="text">Help</span>
            </div>
        </div>
        <div class="mainbox">
            <div class="box1">
                <div class="ideas">
                    WHAT NEW IDEAS YOU HAVE TODAY?
                </div>
                <textarea rows="10px" cols="45px" placeholder="Write your ideas">
                </textarea>
            </div>
        </div>
    </div>
</body>
</html>
